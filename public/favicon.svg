<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
    <defs>
        <style>
            .alpha-text { font-family: 'Arial Black', sans-serif; font-weight: 900; font-size: 104px; fill: white; }
            .bravo-text { font-family: 'Arial Black', sans-serif; font-weight: 900; font-size: 104px; fill: white; }
            @media (prefers-color-scheme: light) {
                .alpha-text, .bravo-text { fill: #1a1a2e; }
            }
        </style>
    </defs>
    <g id="Main-Logo" transform="matrix(1.23571,0,0,1.23571,-176.373,-54.1874)">
        <!-- Alpha -->
        <g transform="matrix(2.70838,0,-0.646064,2.70838,-49.7421,-900.07)">
            <text x="201.542" y="512.617" class="alpha-text">alpha</text>
        </g>
        <!-- Bravo -->
        <g transform="matrix(2.70838,0,-0.646064,2.70838,107,-718.915)">
            <text x="201.542" y="512.617" class="bravo-text">bravo</text>
        </g>
    </g>
</svg>
